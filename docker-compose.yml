services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phase1
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d phase1"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  cart:
    build: ./services/cart
    restart: unless-stopped
    environment:
      PORT: 3000

  payment:
    build: ./services/payment
    restart: unless-stopped
    environment:
      PORT: 3000

  ads:
    build: ./services/ads
    restart: unless-stopped
    environment:
      PORT: 3000

  app:
    build: .
    restart: unless-stopped
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: phase1
      CART_URL: http://cart:3000
      PAYMENT_URL: http://payment:3000
      ADS_URL: http://ads:3000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
