name: CI

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: website
            context: .
            suffix: ""
          - name: cart
            context: services/cart
            suffix: "-cart"
          - name: payment
            context: services/payment
            suffix: "-payment"
          - name: ads
            context: services/ads
            suffix: "-ads"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.context }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.context }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.context }}
        run: npm test

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.image.outputs.name }}${{ matrix.suffix }}:${{ github.sha }}

  update-manifests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Set new image tags in k8s manifests
        working-directory: k8s
        run: |
          kustomize edit set image \
            website=${{ steps.image.outputs.name }}:${{ github.sha }} \
            cart=${{ steps.image.outputs.name }}-cart:${{ github.sha }} \
            payment=${{ steps.image.outputs.name }}-payment:${{ github.sha }} \
            ads=${{ steps.image.outputs.name }}-ads:${{ github.sha }}

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "ci: deploy ${{ github.sha }} [skip ci]"
            git push
          fi
