name: CI

on:
  push:
    branches: [main]

# Top-level default: nothing. Each job asks only for what it needs.
permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: website
            context: .
            suffix: ""
          - name: cart
            context: services/cart
            suffix: "-cart"
          - name: payment
            context: services/payment
            suffix: "-payment"
          - name: ads
            context: services/ads
            suffix: "-ads"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.context }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.context }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.context }}
        run: npm test

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.image.outputs.name }}${{ matrix.suffix }}:${{ github.sha }}

  update-manifests:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2

      - name: Set new image tags in k8s manifests
        working-directory: k8s
        run: |
          kustomize edit set image \
            website=${{ steps.image.outputs.name }}:${{ github.sha }} \
            cart=${{ steps.image.outputs.name }}-cart:${{ github.sha }} \
            payment=${{ steps.image.outputs.name }}-payment:${{ github.sha }} \
            ads=${{ steps.image.outputs.name }}-ads:${{ github.sha }}

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "ci: deploy ${{ github.sha }} [skip ci]"
            git push
          fi
