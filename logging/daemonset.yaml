apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:5.0.9
          envFrom:
            - secretRef:
                name: fluent-bit-hec
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: storage
              mountPath: /flb-storage
            - name: config
              mountPath: /fluent-bit/etc
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: storage
          hostPath:
            path: /var/log/flb-storage-splunk
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: fluent-bit-config
